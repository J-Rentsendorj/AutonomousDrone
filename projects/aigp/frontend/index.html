<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIGP Flight Operations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM via CDN (no build step needed) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  <!-- Application modules loaded as JSX via Babel -->
  <script type="text/babel" src="components/MetricCard.jsx"></script>
  <script type="text/babel" src="components/StatusBadge.jsx"></script>
  <script type="text/babel" src="components/GateChart.jsx"></script>
  <script type="text/babel" src="components/TrackMap.jsx"></script>
  <script type="text/babel" src="components/Navbar.jsx"></script>
  <script type="text/babel" src="components/Toast.jsx"></script>
  <script type="text/babel" src="services/api.jsx"></script>
  <script type="text/babel" src="screens/DashboardScreen.jsx"></script>
  <script type="text/babel" src="screens/RunDetailScreen.jsx"></script>
  <script type="text/babel" src="screens/PipelineScreen.jsx"></script>
  <script type="text/babel" src="screens/NewRunScreen.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
